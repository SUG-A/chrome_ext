<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>設定画面</title>
  <style>
    body {
      padding: 20px;
      font-family: sans-serif;
      width: 300px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 8px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <h3>指定URLの設定</h3>
  <input type="text" id="targetUrl" placeholder="https://example.com/">
  <button id="saveBtn">保存する</button>

  <script src="options.js"></script>
</body>

</html>
