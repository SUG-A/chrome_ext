<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>

<body>

  <div class="container">
    <h2>設定中のアラーム</h2>

    <div id="alarmList"></div>

    <hr class="divider">

    <div class="section-title">手動でアラームを追加</div>
    <div class="input-container">
      <div class="input-row">
        <input type="time" id="alarmTime" required>
        <input type="text" id="alarmTitle" placeholder="予定名（例：朝会）" required>
        <button id="addAlarmBtn" class="btn btn-success">追加</button>
      </div>
    </div>

    <div class="section-title">ページから一括登録</div>
    <div class="sync-container">
      <div class="minus-row">
        <span>予定の</span>
        <input type="number" id="minusMinutes" value="0" min="0">
        <span>分前にアラームをセット</span>
      </div>
      <button id="getFromFileBtn" class="btn btn-primary">画面から取得して追加</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
