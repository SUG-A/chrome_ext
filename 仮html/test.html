<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>拡張機能テスト用ページ（セレクタ修正版）</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 30px;
      background: #f0f2f5;
    }

    .calendar-container {
      background: white;
      padding: 20px;
      border-radius: 8px;
      max-width: 500px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    h1 {
      font-size: 18px;
      color: #333;
      border-bottom: 2px solid #00bb55;
      padding-bottom: 8px;
    }

    /* セレクタに合わせたスタイル設定 */
    .date-of-month.today {
      background: #e6f7ff;
      border: 1px solid #1890ff;
      padding: 12px;
      border-radius: 6px;
    }

    .date-label {
      font-weight: bold;
      color: #1890ff;
      margin-bottom: 8px;
      display: block;
    }

    .schedule {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .schedule li {
      padding: 6px 10px;
      margin-bottom: 4px;
      background: white;
      border-radius: 4px;
      border-left: 4px solid #00bb55;
    }
  </style>
</head>

<body>

  <div class="calendar-container">
    <h1>ESM 今日のスケジュール</h1>
    <p style="font-size: 12px; color: gray;">※「.date-of-month.today .schedule span」のセレクタに対応させました。</p>

    <div class="date-of-month today">
      <span class="date-label">今日の日付のマス</span>

      <ul class="schedule">
        <li><span>08:30 朝会</span></li>
        <li><span>10:00~11:00 全社会議</span></li>
        <li><span>12:55 チーム昼礼</span></li>
        <li><span>23:30~23:59 進捗報告会</span></li>
        <li><span>23:59 退勤</span></li>
      </ul>

    </div>
  </div>

</body>

</html>
